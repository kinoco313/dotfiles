# ===========================================
# tmux.conf — Catppuccin Mocha theme
# ===========================================

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# --- True Color ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Vi mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Clipboard integration (OS detection)
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (vim-like) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ===========================================
# Status bar — Catppuccin Mocha
# ===========================================
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left
set -g status-left-length 40
set -g status-left "#[bg=#f38ba8,fg=#11111b,bold]  #S #[bg=#1e1e2e,fg=#f38ba8] "

# Right
set -g status-right-length 60
set -g status-right "#[fg=#74c7ec]#[bg=#74c7ec,fg=#11111b]  %H:%M #[bg=#1e1e2e,fg=#74c7ec]"

# Window tabs
set -g window-status-format "#[fg=#45475a]#[bg=#45475a,fg=#cdd6f4] #I:#W #[fg=#45475a,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#fab387]#[bg=#fab387,fg=#11111b,bold] #I:#W #[fg=#fab387,bg=#1e1e2e]"
set -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#fab387"

# Message style
set -g message-style "bg=#fab387,fg=#11111b"
