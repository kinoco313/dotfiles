\n$character
"""

[os]
disabled = false
style = "bg:#9A348E fg:#FFFFFF"
format = "[ $symbol ]($style)"

[os.symbols]
Ubuntu = "ūüźß Ubuntu "
Macos = "ūüćé Mac "

[directory]
style = "bg:#DA627D fg:#FFFFFF"
format = "[ $path ]($style)"
truncation_length = 3
fish_style_pwd_dir_length = 1

[git_branch]
symbol = "Ôźė"
style = "bg:#FCA17D fg:#000000"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#FCA17D fg:#000000"
format = "[($all_status$ahead_behind )]($style)"

[python]
symbol = "ūüźć"
style = "bg:#86BBD8 fg:#000000"
format = "[ $symbol ($version) ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A fg:#FFFFFF"
format = "[ ůĪĎé $time ]($style)"

[character]
success_symbol = "[‚ĚĮ](bold green)"
error_symbol = "[‚ĚĮ](bold red)"
