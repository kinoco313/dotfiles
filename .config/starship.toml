add_newline = true

# プロンプト全体のレイアウト
format = """
[░▒▓](#9A348E)\
[ 🐧 Ubuntu ](bg:#9A348E fg:#FFFFFF)\
[](fg:#9A348E bg:#DA627D)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$c$python$golang$nodejs$rust\
[](fg:#86BBD8 bg:#06969A)\
$docker_context\
[](fg:#06969A bg:#33658A)\
$time\
[ ](fg:#33658A)\
\n$character
"""

[directory]
style = "bg:#DA627D fg:#FFFFFF"
format = "[ $path ]($style)"
truncation_length = 3
fish_style_pwd_dir_length = 1

[git_branch]
symbol = ""
style = "bg:#FCA17D fg:#000000"
# 二重の括弧 [[ ]] を [ ] に修正
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#FCA17D fg:#000000"
# 二重の括弧 [[ ]] を [ ] に修正
format = "[($all_status$ahead_behind )]($style)"

[python]
symbol = "🐍"
style = "bg:#86BBD8 fg:#000000"
format = "[ $symbol ($version) ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A fg:#FFFFFF"
# 二重の括弧 [[ ]] を [ ] に修正
format = "[ 󱑎 $time ]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
