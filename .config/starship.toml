add_newline = true

format = """
[‚ĖĎ‚Ėí‚Ėď](#9A348E)\
$os\
[Óāį](fg:#9A348E bg:#DA627D)\
$directory\
[Óāį](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[Óāį](fg:#FCA17D bg:#86BBD8)\
$c$python$golang$nodejs$rust\
[Óāį](fg:#86BBD8 bg:#06969A)\
$docker_context\
[Óāį](fg:#06969A bg:#33658A)\
$time\
